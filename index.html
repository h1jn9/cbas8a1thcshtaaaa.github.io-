<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HỆ THỐNG PIN MẶT TRỜI THÔNG MINH</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background-image: url('https://pngtree.com/freebackground/solar-energy-environmental-protection-poster-background-material_1118370.html');
    background-size: cover;
    background-position: center;
}

/* nền mờ */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    min-height: 100vh;
    padding-top: 80px;
}

/* tiêu đề bay từ trên xuống */
h1 {
    font-size: 50px;
    color: #00ffcc;
    text-transform: uppercase;
    animation: slideDown 1.5s ease;

    text-shadow: 0 0 10px #00ffcc, 0 0 25px #00ffcc;
}

/* chữ phụ */
.subtitle {
    font-size: 24px;
    margin-top: 20px;
    animation: fadeIn 2s ease;
}

/* video to hơn */
iframe {
    margin-top: 30px;
    width: 80%;
    max-width: 900px;
    height: 500px;
    border-radius: 15px;
    transition: 0.4s;
}

iframe:hover {
    transform: scale(1.05);
}

/* hiệu ứng */
@keyframes slideDown {
    from {
        transform: translateY(-80px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="overlay">

    <h1>HỆ THỐNG PIN MẶT TRỜI THÔNG MINH</h1>

    <div class="subtitle">🎤 VIDEO THUYẾT MINH</div>

    <iframe src="https://www.youtube.com/embed/ID_VIDEO"></iframe>

</div>

</body>
</html>
