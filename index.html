<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hệ thống pin mặt trời thông minh</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background-image: url('https://images.unsplash.com/photo-1509395176047-4a66953fd231');
    background-size: cover;
    background-position: center;
}

/* nền mờ */
.overlay {
    background: rgba(0, 0, 0, 0.65);
    min-height: 100vh;
    padding-top: 60px;
}

/* tiêu đề phát sáng */
h1 {
    font-size: 45px;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    animation: glow 2s infinite alternate;
}

/* chữ phụ */
.subtitle {
    font-size: 22px;
    margin-top: 20px;
    animation: fadeIn 2s ease;
}

/* video */
iframe {
    margin-top: 20px;
    border-radius: 12px;
    transition: 0.4s;
}

iframe:hover {
    transform: scale(1.05);
}

/* hiệu ứng glow */
@keyframes glow {
    from {
        text-shadow: 0 0 10px #00ffff;
    }
    to {
        text-shadow: 0 0 25px #00ffff, 0 0 40px #00ffff;
    }
}

/* hiệu ứng hiện dần */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="overlay">

    <!-- TIÊU ĐỀ -->
    <h1>HỆ THỐNG PIN MẶT TRỜI THÔNG MINH</h1>

    <!-- CHỮ -->
    <div class="subtitle">🎤 Video thuyết minh</div>

    <!-- VIDEO -->
    <iframe width="560" height="315"
    src="https://www.youtube.com/embed/ID_VIDEO">
    </iframe>

</div>

</body>
</html>
