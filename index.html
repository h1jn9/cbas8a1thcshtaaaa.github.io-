<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm của tôi</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            text-align: center;

            /* Ảnh nền */
            background-image: url('https://vi.pngtree.com/free-backgrounds-photos/b%E1%BA%A3o-v%E1%BB%87-m%C3%B4i-tr%C6%B0%E1%BB%9Dng');
            background-size: cover;
            background-position: center;
        }

        /* Lớp làm tối nền cho dễ đọc */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            padding-top: 50px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        iframe {
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="overlay">

        <h1>GIỚI THIỆU SẢN PHẨM</h1>

        <p>Video giới thiệu:</p>

        <iframe width="560" height="315"
        src="https://www.youtube.com/embed/ID_VIDEO">
        </iframe>

        <p>Cảm ơn thầy cô đã xem!</p>

    </div>
</body>
</html>
