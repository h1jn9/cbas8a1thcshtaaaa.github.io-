<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sản phẩm của tôi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background-image: url('https://vi.pngtree.com/free-backgrounds-photos/m%C3%B4i-tr%C6%B0%E1%BB%9Dng');
    background-size: cover;
    background-position: center;
}

/* lớp nền mờ */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    min-height: 100vh;
    padding-top: 80px;
}

/* hiệu ứng chữ chạy xuống */
h1 {
    font-size: 45px;
    animation: slideDown 1s ease;
}

/* hiệu ứng mờ dần */
.fade {
    animation: fadeIn 2s ease;
}

/* hiệu ứng phóng to khi hover */
iframe {
    border-radius: 12px;
    transition: 0.3s;
}

iframe:hover {
    transform: scale(1.05);
}

/* nút bấm */
.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: red;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.button:hover {
    background: orange;
    transform: scale(1.1);
}

/* animation */
@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

</head>

<body>

<div class="overlay">

    <h1>GIỚI THIỆU SẢN PHẨM</h1>

    <p class="fade">Video giới thiệu:</p>

    <iframe width="560" height="315"
    src="https://www.youtube.com/embed/ID_VIDEO">
    </iframe>

    <br>

    <a class="button" href="#">Xem thêm</a>

    <p class="fade">Cảm ơn thầy cô đã xem!</p>

</div>

</body>
</html>
